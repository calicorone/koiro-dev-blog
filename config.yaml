baseURL: "https://blog.koiro.me"
title: "KOIRO Archive"
defaultContentLanguage: "ko"
defaultContentLanguageInSubdir: false
buildFuture: true

languages:
  ko:
    languageName: 한국어
    label: 한국어
    weight: 1
    contentDir: content/ko
    params:
      description: "기록하고 탐구하고 실험한다"
      kicker: "Archive"
  en:
    languageName: English
    label: English
    weight: 2
    contentDir: content/en
    params:
      description: "Notes on AI, engineering, and the things in between"
      kicker: "Archive"

permalinks:
  posts: "/:year/:month/:day/:slug/"

outputFormats:
  JSON:
    name: "json"
    mediaType: "application/json"
    baseName: "posts"

outputs:
  home: ["HTML", "JSON", "RSS"]

markup:
  goldmark:
    parser:
      attribute:
        block: true
    renderer:
      unsafe: true

params:
  author: KOIRO
