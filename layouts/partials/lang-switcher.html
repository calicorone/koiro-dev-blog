{{- if hugo.IsMultilingual -}}
<div class="lang-switcher" aria-label="Language">
  {{- range $i, $p := sort .AllTranslations ".Language.Weight" -}}
    {{- if eq $p.Lang $.Site.Language.Lang -}}
      <span class="lang-switcher__current">{{ $p.Lang | upper }}</span>
    {{- else -}}
      <a class="lang-switcher__link" href="{{ $p.RelPermalink }}" hreflang="{{ $p.Lang }}">{{ $p.Lang | upper }}</a>
    {{- end -}}
  {{- end -}}
</div>
{{- end -}}
