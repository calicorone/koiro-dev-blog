<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 905 1024" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Segoe UI, system-ui, sans-serif">
  <title>Quantum Computing Key Concepts</title>
  <rect width="905" height="1024" fill="#0a0a0f"/>
  <text x="452" y="48" text-anchor="middle" fill="#e8e8f0" font-size="22" font-weight="700">Quantum Computing - Key Concepts</text>

  <text x="40" y="88" fill="#7878a0" font-size="11" font-weight="600">01</text>
  <text x="68" y="88" fill="#e8e8f0" font-size="14" font-weight="700">Classical Bit vs Qubit</text>
  <rect x="40" y="100" width="400" height="100" rx="10" fill="#111118" stroke="#888780" stroke-width="0.5"/>
  <text x="56" y="122" fill="#888780" font-size="10">CLASSICAL BIT</text>
  <text x="56" y="142" fill="#e8e8f0" font-size="13" font-weight="700">0 or 1</text>
  <text x="56" y="162" fill="#a8a8c0" font-size="10">Deterministic, fixed state</text>
  <text x="56" y="178" fill="#a8a8c0" font-size="10">n bits = n values</text>
  <rect x="465" y="100" width="400" height="100" rx="10" fill="#111118" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="481" y="122" fill="#a78bfa" font-size="10">QUBIT</text>
  <text x="481" y="142" fill="#e8e8f0" font-size="13" font-weight="700">Superposition of 0 and 1</text>
  <text x="481" y="162" fill="#a8a8c0" font-size="10">Probabilistic, collapses on measure</text>
  <text x="481" y="178" fill="#a8a8c0" font-size="10">n qubits = 2^n states</text>

  <text x="40" y="228" fill="#7878a0" font-size="11" font-weight="600">02</text>
  <text x="68" y="228" fill="#e8e8f0" font-size="14" font-weight="700">Three Core Principles</text>
  <rect x="40" y="242" width="265" height="110" rx="10" fill="#111118" stroke="#2dd4bf" stroke-width="0.5"/>
  <text x="56" y="264" fill="#2dd4bf" font-size="10">SUPERPOSITION</text>
  <text x="56" y="284" fill="#e8e8f0" font-size="12" font-weight="700">0 and 1 at once</text>
  <text x="56" y="304" fill="#a8a8c0" font-size="9">n qubits = 2^n parallel states</text>
  <rect x="320" y="242" width="265" height="110" rx="10" fill="#111118" stroke="#fb7185" stroke-width="0.5"/>
  <text x="336" y="264" fill="#fb7185" font-size="10">ENTANGLEMENT</text>
  <text x="336" y="284" fill="#e8e8f0" font-size="12" font-weight="700">Non-local correlation</text>
  <text x="336" y="304" fill="#a8a8c0" font-size="9">Bell state, instant correlation</text>
  <rect x="600" y="242" width="265" height="110" rx="10" fill="#111118" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="616" y="264" fill="#fbbf24" font-size="10">INTERFERENCE</text>
  <text x="616" y="284" fill="#e8e8f0" font-size="12" font-weight="700">Amplify / cancel paths</text>
  <text x="616" y="304" fill="#a8a8c0" font-size="9">Core of quantum algorithms</text>

  <text x="40" y="382" fill="#7878a0" font-size="11" font-weight="600">03</text>
  <text x="68" y="382" fill="#e8e8f0" font-size="14" font-weight="700">How It Works</text>
  <rect x="40" y="396" width="825" height="44" rx="8" fill="#111118" stroke="#60a5fa" stroke-width="0.5"/>
  <text x="56" y="424" fill="#60a5fa" font-size="11" font-weight="600">1. Initialize</text>
  <text x="160" y="424" fill="#a8a8c0" font-size="10">Reset qubits to |0&gt;</text>
  <rect x="40" y="448" width="825" height="44" rx="8" fill="#111118" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="56" y="476" fill="#a78bfa" font-size="11" font-weight="600">2. Apply gates</text>
  <text x="160" y="476" fill="#a8a8c0" font-size="10">H, CNOT, Toffoli - superposition and entanglement</text>
  <rect x="40" y="500" width="825" height="44" rx="8" fill="#111118" stroke="#2dd4bf" stroke-width="0.5"/>
  <text x="56" y="528" fill="#2dd4bf" font-size="11" font-weight="600">3. Interference</text>
  <text x="160" y="528" fill="#a8a8c0" font-size="10">Boost correct answers, cancel wrong ones</text>
  <rect x="40" y="552" width="825" height="44" rx="8" fill="#111118" stroke="#888780" stroke-width="0.5"/>
  <text x="56" y="580" fill="#e8e8f0" font-size="11" font-weight="600">4. Measure</text>
  <text x="160" y="580" fill="#a8a8c0" font-size="10">Wavefunction collapse to classical bits</text>

  <text x="40" y="628" fill="#7878a0" font-size="11" font-weight="600">04</text>
  <text x="68" y="628" fill="#e8e8f0" font-size="14" font-weight="700">Applications</text>
  <rect x="40" y="642" width="195" height="88" rx="8" fill="#111118" stroke="#60a5fa" stroke-width="0.5"/>
  <text x="56" y="664" fill="#60a5fa" font-size="10">CRYPTOGRAPHY</text>
  <text x="56" y="682" fill="#a8a8c0" font-size="9">Shor threat, QKD, PQC</text>
  <rect x="250" y="642" width="195" height="88" rx="8" fill="#111118" stroke="#4ade80" stroke-width="0.5"/>
  <text x="266" y="664" fill="#4ade80" font-size="10">DRUG DISCOVERY</text>
  <text x="266" y="682" fill="#a8a8c0" font-size="9">Molecular simulation</text>
  <rect x="460" y="642" width="195" height="88" rx="8" fill="#111118" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="476" y="664" fill="#fbbf24" font-size="10">MACHINE LEARNING</text>
  <text x="476" y="682" fill="#a8a8c0" font-size="9">QML, optimization</text>
  <rect x="670" y="642" width="195" height="88" rx="8" fill="#111118" stroke="#fb7185" stroke-width="0.5"/>
  <text x="686" y="664" fill="#fb7185" font-size="10">FINANCE</text>
  <text x="686" y="682" fill="#a8a8c0" font-size="9">Portfolio, risk</text>

  <text x="40" y="762" fill="#7878a0" font-size="11" font-weight="600">05</text>
  <text x="68" y="762" fill="#e8e8f0" font-size="14" font-weight="700">NISQ Era and Limits</text>
  <rect x="40" y="776" width="825" height="200" rx="12" fill="#1a1020" stroke="#ec4899" stroke-width="0.5"/>
  <text x="56" y="804" fill="#f9a8d4" font-size="12" font-weight="700">NISQ - Noisy Intermediate-Scale Quantum</text>
  <text x="56" y="828" fill="#a8a8c0" font-size="10">- Decoherence: quantum state lost in microseconds</text>
  <text x="56" y="848" fill="#a8a8c0" font-size="10">- High error rates: fault tolerance still developing</text>
  <text x="56" y="868" fill="#a8a8c0" font-size="10">- Cryogenic hardware: ~15 mK for superconducting qubits</text>
  <text x="56" y="888" fill="#a8a8c0" font-size="10">- 1,000+ physical qubits today; ~1M needed per logical qubit</text>
  <text x="56" y="920" fill="#7878a0" font-size="9">Hybrid algorithms (VQE, QAOA) run on today hardware</text>
</svg>
