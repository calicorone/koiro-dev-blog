<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>양자 얽힘 시뮬레이터</title>
<style>
  :root {
    --color-text-primary: #e8e8f0;
    --color-text-secondary: #a8a8c0;
    --color-text-tertiary: #7878a0;
    --color-text-info: #60a5fa;
    --color-text-warning: #fbbf24;
    --color-text-danger: #fb7185;
    --color-text-success: #4ade80;
    --color-background-secondary: #1a1a24;
    --color-background-info: rgba(96, 165, 250, 0.14);
    --color-background-warning: rgba(251, 191, 36, 0.14);
    --color-background-danger: rgba(251, 113, 133, 0.14);
    --color-border-secondary: rgba(255, 255, 255, 0.15);
    --color-border-tertiary: rgba(255, 255, 255, 0.08);
    --color-border-info: rgba(96, 165, 250, 0.35);
    --border-radius-md: 10px;
  }
  html, body { margin: 0; padding: 0; background: #0a0a0f; color: var(--color-text-primary); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  body { padding: 16px 20px 24px; max-width: 720px; margin: 0 auto; }
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
  .ts { font-size: 11px; fill: var(--color-text-secondary); font-family: inherit; }
  .th { fill: #7F77DD; font-weight: 600; font-family: inherit; }
  @keyframes pulse-connect { 0%,100%{opacity:0.3} 50%{opacity:1} }
  @keyframes spin-particle { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes flash-measure { 0%{opacity:1} 30%{opacity:0.2} 100%{opacity:1} }
  .connecting-line { animation: pulse-connect 1.8s ease-in-out infinite; }
  .unmeasured-particle { animation: spin-particle 3s linear infinite; }
  .flash { animation: flash-measure 0.4s ease-out; }
  * { box-sizing: border-box; }
  .btn {
    background: transparent;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    color: var(--color-text-primary);
    font-size: 13px;
    padding: 7px 16px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: var(--color-background-secondary); }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: var(--color-background-info);
    color: var(--color-text-info);
    border-color: var(--color-border-info);
    font-weight: 500;
  }
  .btn-primary:hover { opacity: 0.85; }
  .state-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
  }
  .badge-super { background: var(--color-background-warning); color: var(--color-text-warning); }
  .badge-up { background: var(--color-background-danger); color: var(--color-text-danger); }
  .badge-down { background: var(--color-background-info); color: var(--color-text-info); }
  .log-entry {
    font-size: 12px;
    color: var(--color-text-secondary);
    padding: 5px 0;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    line-height: 1.5;
  }
  .log-entry:last-child { border-bottom: none; }
  .log-highlight { color: var(--color-text-primary); font-weight: 500; }
</style>
</head>
<body>

<h2 class="sr-only">양자 얽힘 인터랙티브 시뮬레이터 — 두 입자를 얽히게 만들고 측정해보세요</h2>

<div style="padding: 1rem 0 0;">

  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem;">
    <div style="font-size:13px; color:var(--color-text-secondary)">
      상태: <span id="system-state-badge" class="state-badge badge-super">얽힘 대기</span>
    </div>
    <div style="display:flex; gap:8px;">
      <button class="btn btn-primary" onclick="entangle()">얽힘 생성</button>
      <button class="btn" onclick="resetAll()">초기화</button>
    </div>
  </div>

  <svg width="100%" viewBox="0 0 680 220" role="img" id="main-svg">
    <title>양자 얽힘 시뮬레이터 — 두 입자 A와 B</title>
    <desc>서울과 뉴욕에 있는 두 입자의 얽힘 상태를 시각화합니다</desc>
    <defs>
      <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <rect x="40" y="30" width="220" height="160" rx="12" fill="none" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="4 3"/>
    <text class="ts" x="150" y="52" text-anchor="middle" dominant-baseline="central">실험실 A  (서울)</text>

    <rect x="420" y="30" width="220" height="160" rx="12" fill="none" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="4 3"/>
    <text class="ts" x="530" y="52" text-anchor="middle" dominant-baseline="central">실험실 B  (뉴욕)</text>

    <g id="particle-a-group" transform="translate(150, 125)">
      <circle id="particle-a-ring" r="34" fill="none" stroke="#7F77DD" stroke-width="0.5" opacity="0.4" class="unmeasured-particle"/>
      <circle id="particle-a" r="22" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
      <text id="particle-a-label" class="th" x="0" y="0" text-anchor="middle" dominant-baseline="central" font-size="20">?</text>
    </g>
    <text class="ts" x="150" y="175" text-anchor="middle" dominant-baseline="central">입자 A</text>

    <g id="particle-b-group" transform="translate(530, 125)">
      <circle id="particle-b-ring" r="34" fill="none" stroke="#7F77DD" stroke-width="0.5" opacity="0.4" class="unmeasured-particle"/>
      <circle id="particle-b" r="22" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
      <text id="particle-b-label" class="th" x="0" y="0" text-anchor="middle" dominant-baseline="central" font-size="20">?</text>
    </g>
    <text class="ts" x="530" y="175" text-anchor="middle" dominant-baseline="central">입자 B</text>

    <line id="entangle-line" x1="184" y1="125" x2="496" y2="125"
      stroke="#7F77DD" stroke-width="1.5" stroke-dasharray="6 4" opacity="0"
      class="connecting-line"/>
    <text id="entangle-label" class="ts" x="340" y="112" text-anchor="middle" opacity="0">얽힘 연결</text>

    <text class="ts" x="340" y="200" text-anchor="middle" opacity="0.5">— 11,000 km —</text>
  </svg>

  <div style="display:flex; gap:12px; margin-bottom:1.5rem;">
    <button class="btn" style="flex:1" onclick="measure('A')" id="btn-a">입자 A 측정 (서울)</button>
    <button class="btn" style="flex:1" onclick="measure('B')" id="btn-b">입자 B 측정 (뉴욕)</button>
  </div>

  <div style="display:grid; grid-template-columns:repeat(3, minmax(0,1fr)); gap:10px; margin-bottom:1.5rem;">
    <div style="background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:12px; text-align:center;">
      <div style="font-size:12px; color:var(--color-text-secondary); margin-bottom:4px;">총 측정 횟수</div>
      <div style="font-size:22px; font-weight:500;" id="stat-total">0</div>
    </div>
    <div style="background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:12px; text-align:center;">
      <div style="font-size:12px; color:var(--color-text-secondary); margin-bottom:4px;">상관 일치율</div>
      <div style="font-size:22px; font-weight:500;" id="stat-corr">—</div>
    </div>
    <div style="background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:12px; text-align:center;">
      <div style="font-size:12px; color:var(--color-text-secondary); margin-bottom:4px;">이론 예측</div>
      <div style="font-size:22px; font-weight:500; color:var(--color-text-success);">100%</div>
    </div>
  </div>

  <div style="border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-md); padding:12px; min-height:80px;">
    <div style="font-size:12px; color:var(--color-text-tertiary); margin-bottom:8px;">측정 기록</div>
    <div id="log-container">
      <div class="log-entry" style="color:var(--color-text-tertiary); font-style:italic;">
        먼저 "얽힘 생성" 버튼을 눌러보세요
      </div>
    </div>
  </div>

  <div style="margin-top:1.5rem; border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-md); overflow:hidden;">
    <div style="display:flex; border-bottom:0.5px solid var(--color-border-tertiary);">
      <button class="btn" id="tab0" onclick="showTab(0)" style="flex:1; border:none; border-radius:0; border-right:0.5px solid var(--color-border-tertiary); font-size:12px; padding:8px;">무엇인가</button>
      <button class="btn" id="tab1" onclick="showTab(1)" style="flex:1; border:none; border-radius:0; border-right:0.5px solid var(--color-border-tertiary); font-size:12px; padding:8px;">어떻게 작동</button>
      <button class="btn" id="tab2" onclick="showTab(2)" style="flex:1; border:none; border-radius:0; font-size:12px; padding:8px;">왜 신기한가</button>
    </div>
    <div id="tab-content" style="padding:14px; font-size:13px; color:var(--color-text-secondary); line-height:1.7;"></div>
  </div>

</div>

<script>
const tabs = [
  `<strong style="color:var(--color-text-primary)">얽힘(Entanglement)</strong>은 두 입자가 하나의 양자 상태를 공유하는 현상입니다.<br><br>
  얽힌 두 입자는 아무리 멀리 떨어져도 서로 독립적인 상태를 갖지 않습니다 — 하나가 "위(↑)"로 측정되면, 상대방은 반드시 "아래(↓)"가 됩니다. 거리는 무관합니다.`,

  `<strong style="color:var(--color-text-primary)">벨 상태(Bell State)</strong>: 두 입자를 생성할 때 물리적으로 상호작용시켜 하나의 얽힌 상태(|↑↓⟩ − |↓↑⟩)를 만듭니다.<br><br>
  측정 전까지 어느 입자도 확정된 스핀이 없습니다. 측정하는 순간 파동함수가 붕괴되며, 한쪽의 결과가 다른 쪽의 결과를 즉각 결정합니다.`,

  `<strong style="color:var(--color-text-primary)">아인슈타인의 반론</strong>: "유령 같은 원격 작용(Spooky action at distance)"이라며 숨겨진 변수가 있을 것이라 주장했습니다.<br><br>
  <strong style="color:var(--color-text-primary)">벨 부등식 실험(1972~현재)</strong>: 실제 실험은 아인슈타인이 틀렸음을 증명했습니다. 정말로 측정 전에는 상태가 결정되지 않으며, 얽힘은 실재합니다.`
];

let state = { entangled: false, measured: {A: null, B: null}, totalRounds: 0, matches: 0 };
let activeTab = 0;

function showTab(i) {
  activeTab = i;
  document.getElementById('tab-content').innerHTML = tabs[i];
  [0,1,2].forEach(j => {
    document.getElementById('tab'+j).style.background = j===i ? 'var(--color-background-secondary)' : '';
  });
}
showTab(0);

function entangle() {
  state.entangled = true;
  state.measured = {A: null, B: null};

  document.getElementById('entangle-line').style.opacity = '1';
  document.getElementById('entangle-label').style.opacity = '1';
  document.getElementById('system-state-badge').textContent = '얽힘 상태 (중첩)';
  document.getElementById('system-state-badge').className = 'state-badge badge-super';

  setParticle('A', '?', '#EEEDFE', '#7F77DD', true);
  setParticle('B', '?', '#EEEDFE', '#7F77DD', true);

  addLog('<span class="log-highlight">얽힘 생성</span> — 입자 A와 B가 벨 상태(|↑↓⟩ − |↓↑⟩)로 얽혔습니다. 두 입자 모두 측정 전에는 스핀이 미결정입니다.');
}

function setParticle(id, label, fill, stroke, spinning) {
  const circle = document.getElementById('particle-'+id.toLowerCase());
  const ring = document.getElementById('particle-'+id.toLowerCase()+'-ring');
  const text = document.getElementById('particle-'+id.toLowerCase()+'-label');
  circle.setAttribute('fill', fill);
  circle.setAttribute('stroke', stroke);
  text.textContent = label;
  ring.style.animationPlayState = spinning ? 'running' : 'paused';
  ring.style.opacity = spinning ? '0.4' : '0';
}

function measure(which) {
  if (!state.entangled) {
    addLog('먼저 얽힘을 생성해주세요.');
    return;
  }
  if (state.measured[which] !== null) {
    addLog(`입자 ${which}는 이미 측정되었습니다. 얽힘을 다시 생성하세요.`);
    return;
  }

  const other = which === 'A' ? 'B' : 'A';
  let result;

  if (state.measured[other] !== null) {
    result = state.measured[other] === '↑' ? '↓' : '↑';
  } else {
    result = Math.random() < 0.5 ? '↑' : '↓';
  }

  state.measured[which] = result;

  const isUp = result === '↑';
  const fill = isUp ? '#FAECE7' : '#E6F1FB';
  const stroke = isUp ? '#993C1D' : '#185FA5';
  setParticle(which, result, fill, stroke, false);

  const loc = which === 'A' ? '서울' : '뉴욕';
  const otherLoc = which === 'A' ? '뉴욕' : '서울';
  let msg = `<span class="log-highlight">입자 ${which} 측정 (${loc})</span> → 스핀 <strong>${result}</strong>`;

  if (state.measured[other] !== null) {
    const otherResult = state.measured[other];
    const otherFill = otherResult === '↑' ? '#FAECE7' : '#E6F1FB';
    const otherStroke = otherResult === '↑' ? '#993C1D' : '#185FA5';
    setParticle(other, otherResult, otherFill, otherStroke, false);

    state.totalRounds++;
    const correlated = state.measured.A !== state.measured.B;
    if (correlated) state.matches++;

    msg += ` — 동시에 ${otherLoc}의 입자 ${other}가 <strong>${otherResult}</strong>로 결정됨 (빛보다 빠른 정보 전달 없음, 순수 상관관계)`;
    document.getElementById('stat-total').textContent = state.totalRounds;
    document.getElementById('stat-corr').textContent = Math.round(state.matches/state.totalRounds*100)+'%';
    document.getElementById('system-state-badge').textContent = '측정 완료';
    document.getElementById('system-state-badge').className = 'state-badge ' + (correlated ? 'badge-up' : 'badge-down');
    document.getElementById('entangle-line').style.opacity = '0.15';
  } else {
    msg += ` — 입자 ${other}(${otherLoc})의 상태는 아직 미결정`;
    document.getElementById('system-state-badge').textContent = `${which} 측정됨, ${other} 대기`;
  }

  addLog(msg);
}

function addLog(msg) {
  const container = document.getElementById('log-container');
  const entry = document.createElement('div');
  entry.className = 'log-entry flash';
  entry.innerHTML = msg;
  container.insertBefore(entry, container.firstChild);
  while (container.children.length > 6) container.removeChild(container.lastChild);
}

function resetAll() {
  state = { entangled: false, measured: {A: null, B: null}, totalRounds: state.totalRounds, matches: state.matches };
  document.getElementById('entangle-line').style.opacity = '0';
  document.getElementById('entangle-label').style.opacity = '0';
  document.getElementById('system-state-badge').textContent = '얽힘 대기';
  document.getElementById('system-state-badge').className = 'state-badge badge-super';
  setParticle('A', '?', '#EEEDFE', '#7F77DD', false);
  setParticle('B', '?', '#EEEDFE', '#7F77DD', false);
  addLog('초기화됨. "얽힘 생성" 버튼으로 다시 시작하세요.');
}
</script>
</body>
</html>
